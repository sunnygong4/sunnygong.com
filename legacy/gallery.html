
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery - Sunny Gong</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <audio id="click-sound" src="audio/click1.mp3" preload="auto"></audio>
  <header class="navbar static-header">

    <a href="index.html" class="nav-logo">
      <img src="images/headerTrans.png" alt="Logo" class="logo" />
    </a>
    <nav>
      <a href="index.html">Home</a>
      <a href="gallery.html" class="active">Gallery</a>
      <a href="projects.html">Projects</a>
      <a href="contact.html">Contact</a>
      <a href="about.html">About</a>
    </nav>
  </header>

  <main class="gallery-page" style="padding-top: 6rem;">
    <h2 style="text-align: center; color: var(--color-primary);">Gallery</h2>
    <div class="gallery-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1.5rem; padding: 2rem;">
      <img src="images/gallery1.jpg" alt="Gallery Image 1" style="width: 100%; border-radius: 8px;" />
      <img src="images/gallery2.jpg" alt="Gallery Image 2" style="width: 100%; border-radius: 8px;" />
      <img src="images/gallery3.jpg" alt="Gallery Image 3" style="width: 100%; border-radius: 8px;" />
      <img src="images/gallery4.jpg" alt="Gallery Image 4" style="width: 100%; border-radius: 8px;" />
      <img src="images/gallery5.jpg" alt="Gallery Image 5" style="width: 100%; border-radius: 8px;" />
      <img src="images/gallery6.jpg" alt="Gallery Image 6" style="width: 100%; border-radius: 8px;" />
    </div>
  </main>

  <footer>
    <p>&copy; 2025 Sunny Gong. All rights reserved.</p>
  </footer>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const clickSound = document.getElementById("click-sound");
      const navLinks = document.querySelectorAll("header.navbar nav a");
  
      navLinks.forEach(link => {
        const href = link.getAttribute("href");
        link.addEventListener("click", (e) => {
          e.preventDefault();
          clickSound.currentTime = 0;
          clickSound.play().then(() => {
            setTimeout(() => {
              window.location.href = href;
            }, 300); // Delay for sound to play
          }).catch(() => {
            window.location.href = href;
          });
        });
      });
    });
  </script>
  
</body>
</html>
