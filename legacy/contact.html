<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact - Sunny Gong</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <audio id="click-sound" src="audio/click1.mp3" preload="auto"></audio>

  <header class="navbar static-header">
    <a href="index.html" class="nav-logo">
      <img src="images/headerTrans.png" alt="Logo" class="logo" />
    </a>
    <nav>
      <a href="index.html">Home</a>
      <a href="gallery.html">Gallery</a>
      <a href="projects.html">Projects</a>
      <a href="contact.html" class="active">Contact</a>
      <a href="about.html">About</a>
    </nav>
  </header>

  <main class="contact-page" style="padding-top: 6rem;">
    <h2 style="text-align: center; color: var(--color-primary);">Contact Me</h2>
    <div style="max-width: 600px; margin: 2rem auto; text-align: center;">
      <p>Feel free to reach out!</p>
      <p>Email: <a href="mailto:s43gong@uwaterloo.ca" style="color: var(--color-light);">s43gong@uwaterloo.ca</a></p>
      <p>Instagram: <a href="https://instagram.com/yourprofile" target="_blank" style="color: var(--color-light);">@yourprofile</a></p>
    </div>
  </main>

  <footer>
    <p>&copy; 2025 Sunny Gong. All rights reserved.</p>
  </footer>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const clickSound = document.getElementById("click-sound");
      const navLinks = document.querySelectorAll("header.navbar nav a");

      navLinks.forEach(link => {
        const href = link.getAttribute("href");
        link.addEventListener("click", (e) => {
          e.preventDefault();
          clickSound.currentTime = 0;
          clickSound.play().then(() => {
            setTimeout(() => {
              window.location.href = href;
            }, 300);
          }).catch(() => {
            window.location.href = href;
          });
        });
      });
    });
  </script>
</body>
</html>
